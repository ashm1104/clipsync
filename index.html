<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#3B6D11" />

    <title>Pastio — the clipboard your devices were always missing</title>
    <meta
      name="description"
      content="Cross-device clipboard sync. Paste anything on one device, get it on the others. No install, no app — just open the URL and paste."
    />
    <meta
      name="keywords"
      content="clipboard sync, clipboard across devices, online clipboard, share clipboard, paste across devices, clipboard manager, cross-device clipboard"
    />
    <meta name="author" content="Pastio" />

    <!-- Open Graph -->
    <meta property="og:title" content="Pastio — cross-device clipboard, no install" />
    <meta
      property="og:description"
      content="Paste anything on one device, get it on the others. Just open the URL and paste."
    />
    <meta property="og:image" content="https://pastio.app/api/og" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://pastio.app" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pastio" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pastio — cross-device clipboard, no install" />
    <meta
      name="twitter:description"
      content="Paste anything on one device, get it on the others."
    />
    <meta name="twitter:image" content="https://pastio.app/api/og" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Canonical -->
    <link rel="canonical" href="https://pastio.app" />

    <!-- Plausible analytics — privacy-friendly, no cookies. -->
    <script async src="https://plausible.io/js/pa-vpaAzJLeDOqumNtLeM23i.js"></script>
    <script>
      window.plausible =
        window.plausible ||
        function () {
          (plausible.q = plausible.q || []).push(arguments);
        };
      plausible.init = plausible.init || function (i) { plausible.o = i || {}; };
      plausible.init();
    </script>

    <!-- Structured data: WebApplication schema for Google rich results -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Pastio",
        "description": "Cross-device clipboard sync. Paste anything on one device, get it on the others.",
        "url": "https://pastio.app",
        "applicationCategory": "ProductivityApplication",
        "operatingSystem": "Any",
        "offers": [
          {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD",
            "name": "Free"
          },
          {
            "@type": "Offer",
            "price": "5",
            "priceCurrency": "USD",
            "name": "Pro Monthly"
          }
        ]
      }
    </script>
  </head>
  <body>
    <!--
      Static SEO content for crawlers that don't run JavaScript (Bing,
      older Googlebot fallback). Visually hidden but in the DOM and HTML
      byte stream. Lives outside #root so React never replaces it.
    -->
    <h1 style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);">
      Pastio — cross-device clipboard sync
    </h1>
    <p style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);">
      Pastio is a real-time cross-device clipboard. Paste anything — text, code, URLs, images, files —
      on one device and it appears instantly on your other devices. Anonymous rooms expire in one hour;
      sign in for personal sync across all your devices with no codes.
    </p>

    <div id="root"></div>
    <noscript>
      Pastio needs JavaScript to sync your clipboard. Please enable JavaScript or use a modern
      browser.
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
